
<!--Esto indica al navegador que version de HTML usamos-->
<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">

<!--mipgaina.html-->
<html>
    <!--Aqui empieza la cabecera de la pagina web-->
    <head>
        <!--Aqui ponemos el titulo que aparece en la pesataña del navegador-->
        <title>Mi primera pagina web</title>
    </head>

    <!--Aqui empieze el contenido /cuerpo de la pagina web que visualizamos-->
    <body style="background: yellow;"> 
        <!--Seteamos el color de fondo con este atributo directamente en la pagina-->
        <h1>Hola Mundo</h1>
        <!--El titulo usa un h1 para realzar el texto y describir el contenido de la pagina-->
    </body>
</html>
